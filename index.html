<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Love Galaxy FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #1a1a2e, #000);
    opacity: 0;
    transition: opacity 2s ease;
    height: 100vh;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}

#title {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    color: #fff;
    font-size: 28px;
    text-shadow: 0 0 20px #fff;
}

#messageBox {
    position: absolute;
    bottom: 80px;
    width: 100%;
    text-align: center;
    font-size: 30px;
    color: #fff;
    text-shadow: 0 0 20px pink;
    opacity: 0;
    transition: opacity 0.5s;
}

#credit {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: #aaa;
    font-size: 14px;
    font-family: "Khmer OS Siemreap", "Noto Sans Khmer", sans-serif;
}
</style>
</head>

<body>

<div id="title">For You 🌙💛</div>
<div id="messageBox"></div>
<div id="credit">
Developed by Sophorn Vipor<br>
សុភ័ណ្ឌ វីប៉
</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/v57tvx.mp3">
</audio>

<script type="importmap">
{
 "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
 }
}
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
let distance = 40;
camera.position.set(0, 15, distance);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// FADE IN
window.onload = () => document.body.style.opacity = 1;

// MUSIC
document.body.addEventListener("click", () => {
    document.getElementById("music").play();
}, { once: true });

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const moonLight = new THREE.PointLight(0xffffff, 3, 300);
moonLight.position.set(0, 0, 0);
scene.add(moonLight);

// MOON 🌙
const loader = new THREE.TextureLoader();
const moon = new THREE.Mesh(
    new THREE.SphereGeometry(5, 64, 64),
    new THREE.MeshStandardMaterial({
        map: loader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg'),
        emissive: 0xaaaaaa,
        emissiveIntensity: 0.6
    })
);
scene.add(moon);

// glow
const glow = new THREE.Mesh(
    new THREE.SphereGeometry(6, 64, 64),
    new THREE.MeshBasicMaterial({
        color: 0xaaaaaa,
        transparent: true,
        opacity: 0.15
    })
);
scene.add(glow);

// STICKERS
const urls = [
"https://media.tenor.com/hMGhBiDHz00AAAAi/tkthao219-bubududu.gif",
"https://media.tenor.com/3fPxcvIy-KIAAAAi/bubu-dudu-sseeyall.gif",
"https://media.tenor.com/_1nOJP-be_UAAAAi/tkthao219-bubududu.gif",
"https://media.tenor.com/mbsKdEmx9V0AAAAi/bubu-cute-bubu-adorable.gif"
];

const textures = urls.map(u => loader.load(u));
const texts = [
"Pov meas",
"Snp jit",
"My Princessss",
"Krob Pich",
"Besdong"
];

// ✨ BEAUTIFUL TEXT
function createText(text) {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    const gradient = ctx.createLinearGradient(0, 0, 1024, 0);
    gradient.addColorStop(0, "#ff9a9e");
    gradient.addColorStop(1, "#fad0c4");

    ctx.fillStyle = gradient;
    ctx.shadowColor = "#ff69b4";
    ctx.shadowBlur = 40;
    ctx.font = "bold 80px Arial";
    ctx.textAlign = "center";
    ctx.fillText(text, 512, 150);

    const texture = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.userData = { baseY: -2, offset: Math.random() * Math.PI * 2 };
    return sprite;
}

// CREATE ANIMATED STICKERS
const objects = [];
for (let i = 0; i < 50; i++) {
    const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
            map: textures[i % textures.length],
            transparent: true
        })
    );

    const r = 18 + Math.random() * 20;
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.002 + Math.random() * 0.003; // random speed
    const floatOffset = Math.random() * Math.PI * 2; // for vertical float

    sprite.userData = { r, angle, speed, baseScale: 4, floatOffset };
    sprite.scale.set(4, 4, 1);

    const label = createText(texts[i % texts.length]);
    label.position.set(0, -2.2, 0);
    label.scale.set(1.2, 1.2, 1);

    sprite.add(label);
    scene.add(sprite);
    objects.push(sprite);
}

// STARS
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(1000 * 3);
for (let i = 0; i < pos.length; i++) pos[i] = (Math.random() - 0.5) * 200;
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.6 })));

// CAMERA CONTROL
let isDown = false, lon = 0, lat = 0;
addEventListener('mousedown', () => isDown = true);
addEventListener('mouseup', () => isDown = false);
addEventListener('mousemove', (e) => {
    if (!isDown) return;
    lon += e.movementX * 0.1;
    lat -= e.movementY * 0.1;
});

// ZOOM
addEventListener('wheel', (e) => {
    distance += e.deltaY * 0.05;
    distance = Math.max(15, Math.min(80, distance));
});

// WINDOW RESIZE
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// UPDATE CAMERA
function updateCamera() {
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    camera.position.x = distance * Math.sin(phi) * Math.cos(theta);
    camera.position.y = distance * Math.cos(phi);
    camera.position.z = distance * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(0,0,0);
}

// LOVE MESSAGES
const messages = [
"I love you 💖",
"You are my everything ✨",
"My princess 👑",
"Forever with you 💞",
"You make me happy 🌙",
"Bong Slanh Oun💖",
"You're my Only One😍",
"Bong Nirk Oun 😭",
"Can't stop Thinking about u 💖",
"You’re my favorite person 💕",
"Always you, my star 🌟❤️",
"No Matter what Happened You still my fv person o 💖",
"I don't care how long it take I'll wait 💖"
];

// CLICK
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

addEventListener('click', (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);
    if (hits.length > 0) {
        const obj = hits[0].object;
        obj.scale.multiplyScalar(1.4);
        setTimeout(() => obj.scale.set(obj.userData.baseScale, obj.userData.baseScale, 1), 300);

        const box = document.getElementById("messageBox");
        box.innerText = messages[Math.floor(Math.random() * messages.length)];
        box.style.opacity = 1;
    }
});

// ANIMATE
function animate() {
    requestAnimationFrame(animate);
    updateCamera();
    moon.rotation.y += 0.003;

    const time = performance.now() * 0.002;
    objects.forEach(o => {
        // Orbit
        o.userData.angle += o.userData.speed;
        o.position.x = Math.cos(o.userData.angle) * o.userData.r;
        o.position.z = Math.sin(o.userData.angle) * o.userData.r;

        // Float up and down
        o.position.y = Math.sin(time + o.userData.floatOffset) * 2;

        // Animate labels
        o.children.forEach(child => {
            child.position.y = child.userData.baseY + Math.sin(time + child.userData.offset) * 0.3;
            child.material.opacity = 0.7 + Math.sin(time + child.userData.offset) * 0.3;
            child.lookAt(camera.position);
        });
    });

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
